server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied to all responses via server block) ───────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # wasm-unsafe-eval  — required for tesseract.js WASM engine
    # worker-src blob:  — tesseract.js spawns its worker via blob: URL
    # connect-src CDN   — tesseract.js fetches language data from projectnaptha.com
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net;" always;

    # ── index.html: never cache ────────────────────────────────────────────────
    # index.html holds references to hashed chunk filenames. If it is served
    # from cache after a rebuild the browser requests chunks that no longer
    # exist, causing "Failed to fetch dynamically imported module" errors.
    # nginx add_header is NOT inherited when a location sets its own headers,
    # so all security headers must be repeated here.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net;" always;
    }

    # ── Hashed assets: cache forever ──────────────────────────────────────────
    # Vite names every JS/CSS file with a content hash, so the filename changes
    # whenever the content changes. It is safe — and efficient — to cache these
    # indefinitely. The browser will only fetch a file it has never seen before.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net;" always;
        try_files $uri =404;
    }

    # ── React client-side routing ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
