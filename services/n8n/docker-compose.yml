# n8n Workflow Automation — managed by RackSpares Setup Wizard
# Deployed via: docker compose -f services/n8n/docker-compose.yml up -d
#
# Web UI:  http://localhost:5678
# Set up your owner account on first visit.
#
# To enable API access for RackSpares integration:
#   1. Log into n8n at http://localhost:5678
#   2. Go to Settings → n8n API → Create API Key
#   3. Enter the API key in RackSpares → Services → n8n

name: rackspares-n8n

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: rackspares-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_HOST: "0.0.0.0"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      # Public REST API enabled — create an API key in Settings after first login
      N8N_PUBLIC_API_DISABLED: "false"
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - rackspares_n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  rackspares_n8n_data:
